version: 2
updates:
  # Single npm entry: root package-lock.json is the hoisted lockfile for the
  # npm-workspaces monorepo (apps/* + packages/*). Listing sub-dirs separately
  # causes duplicate PRs — do NOT re-add /apps/site or /packages/shared.
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      testing:
        patterns: ["vitest*", "@vitest/*", "@playwright/*", "jsdom"]
      lint:
        patterns: ["eslint*", "@eslint/*", "@typescript-eslint/*", "typescript-eslint"]
      tiptap:
        patterns: ["@tiptap/*"]
      types:
        patterns: ["@types/*"]
    ignore:
      # TypeScript 7.0 is the native "Corsa" rewrite — a breaking major that
      # fails typecheck (Dependabot #223, closed 2026-07-13). Allow 6.x, block 7+.
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday }
