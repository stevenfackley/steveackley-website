name: CI / Deploy to GHCR & EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Run unit tests (site)
        run: npm run test:unit -w apps/site

  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Run integration tests (site)
        run: npm run test:integration -w apps/site

  e2e-tests:
    name: "🌐 E2E Tests"
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "postgresql://testuser:testpassword@localhost:5432/e2etest"
      BETTER_AUTH_SECRET: "ci-e2e-test-secret-not-for-production-00000"
      BETTER_AUTH_URL: "http://127.0.0.1:3000"
      GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
      NODE_ENV: "test"
      CI: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: e2etest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Wait for Database
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for database..."
            sleep 2
          done
      - name: Apply database schema
        run: cd apps/site && npx drizzle-kit push --force
      - name: Install Playwright browsers
        run: npx playwright install-deps chromium && npx playwright install chromium
      - name: Build Astro app
        run: npm run build:site
        env:
          NODE_ENV: production
      - name: Start Astro production server
        run: node ./apps/site/dist/server/entry.mjs > /tmp/astro-server.log 2>&1 &
        env:
          NODE_ENV: production
          PORT: 3000
          HOST: "127.0.0.1"
      - name: Wait for server to be ready
        run: |
          echo "Waiting for Astro health check on 127.0.0.1:3000/api/health..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Server is healthy (HTTP 200) ✓"
              exit 0
            fi
            echo "Attempt $i/60: HTTP $HTTP_CODE — waiting 2s..."
            sleep 2
          done
          echo "Server did not become healthy in time ✗"
          echo "=== Astro Server Startup Logs ==="
          cat /tmp/astro-server.log
          exit 1
      - name: Run E2E tests
        run: npm run test:e2e -w apps/site
        env:
          BASE_URL: "http://127.0.0.1:3000"
      - name: Show server logs on failure
        if: failure()
        run: |
          echo "=== Astro Server Logs (/tmp/astro-server.log) ==="
          tail -n 200 /tmp/astro-server.log 2>/dev/null || echo "(log file not found)"
          echo "=== End of Logs ==="
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/site/playwright-report/
          retention-days: 7


  build-and-push:
    name: "🐳 Build & Push to GHCR"
    needs: [unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ghcr.io/stevenfackley/steveackley-web@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/stevenfackley/steveackley-web:buildcache
          cache-to: type=registry,ref=ghcr.io/stevenfackley/steveackley-web:buildcache,mode=max
          tags: |
            ghcr.io/stevenfackley/steveackley-web:latest
            ghcr.io/stevenfackley/steveackley-web:sha-${{ github.sha }}

  deploy:
    name: "🚀 Deploy to EC2"
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            
            # Stash any local changes to avoid merge conflicts
            git stash --include-untracked || true
            git pull origin main
            chmod +x docker/entrypoint.sh
            chmod +x docker/seed-admin.cjs
            
            # Construct .env from secrets (chmod 600 before writing to protect contents)
            AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
            if [ -z "$AUTH_SECRET" ]; then
              echo "ERROR: AUTH_SECRET is not set in GitHub Secrets — deployment aborted to prevent auth failure"
              exit 1
            fi

            # URL-encode the plus sign in DATABASE_URL if present (it breaks Node URL parser)
            ENCODED_DB_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's/\+/%2B/g')

            touch .env && chmod 600 .env
            printf 'DATABASE_URL=%s\nAUTH_SECRET=%s\nBETTER_AUTH_SECRET=%s\n' \
              "$ENCODED_DB_URL" \
              "$AUTH_SECRET" \
              "$AUTH_SECRET" >> .env

            printf 'BETTER_AUTH_URL=%s\nADMIN_EMAIL=%s\nADMIN_PASSWORD_HASH=%s\nGH_API_TOKEN=%s\n' \
              "https://steveackley.org" \
              "stevenfackley@gmail.com" \
              "${{ secrets.ADMIN_PASSWORD_HASH }}" \
              "${{ secrets.GH_API_TOKEN }}" >> .env
            printf 'R2_ACCOUNT_ID=%s\nR2_ACCESS_KEY_ID=%s\nR2_SECRET_ACCESS_KEY=%s\nR2_BUCKET=%s\nR2_PUBLIC_URL=%s\n' \
              "${{ secrets.R2_ACCOUNT_ID }}" \
              "${{ secrets.R2_ACCESS_KEY_ID }}" \
              "${{ secrets.R2_SECRET_ACCESS_KEY }}" \
              "${{ secrets.R2_BUCKET }}" \
              "${{ secrets.R2_PUBLIC_URL }}" >> .env


            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose pull web
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose up -d --remove-orphans
            docker image prune -f

            # Wait for the web container to pass its health checks (up to 60s)
            echo "Waiting for steveackley-web to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Status}}' steveackley-web 2>/dev/null || echo "missing")
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/ 2>/dev/null || echo "000")
              echo "  attempt $i/30: container=$STATUS http=$HTTP"
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
                echo "✓ Deployment healthy"
                exit 0
              fi
              sleep 2
            done
            echo "✗ Deployment did not become healthy in time"
            docker logs steveackley-web --tail 50
            exit 1
