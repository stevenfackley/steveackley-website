name: CI / Deploy to GHCR & EC2

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    name: "🌐 E2E Tests"
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: e2etest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: "postgresql://testuser:testpassword@127.0.0.1:5432/e2etest"
      BETTER_AUTH_SECRET: "ci-e2e-test-secret-not-for-production-00000"
      BETTER_AUTH_URL: "http://127.0.0.1:3000"
      NODE_ENV: "test"
      CI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Apply database migrations
        run: npm run db:migrate
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Build Astro app
        run: npm run build
      - name: Start Astro production server
        run: node ./dist/server/entry.mjs > /tmp/astro-server.log 2>&1 &
        env:
          NODE_ENV: production
          PORT: 3000
          HOST: "0.0.0.0"
      - name: Wait for server to be ready
        run: |
          echo "Waiting for Astro to accept connections on 127.0.0.1:3000..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ 2>/dev/null || echo "000")
            if echo "$HTTP_CODE" | grep -qE "^[1-9][0-9][0-9]$"; then
              echo "Server is up (HTTP $HTTP_CODE) ✓"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time ✗"
          echo "=== Astro Server Startup Logs ==="
          cat /tmp/astro-server.log
          exit 1
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: "http://127.0.0.1:3000"
      - name: Show server logs on failure
        if: failure()
        run: |
          echo "=== Astro Server Logs (/tmp/astro-server.log) ==="
          tail -n 200 /tmp/astro-server.log
          echo "=== End of Logs ==="

  build-and-push:
    name: "🐳 Build & Push to GHCR"
    needs: [unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ghcr.io/stevenfackley/steveackley-web@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          tags: |
            ghcr.io/stevenfackley/steveackley-web:latest
            ghcr.io/stevenfackley/steveackley-web:sha-${{ github.sha }}

  deploy:
    name: "🚀 Deploy to EC2"
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git pull origin main
            
            # Construct web.env from secrets
            printf 'DATABASE_URL=%s\nBETTER_AUTH_SECRET=%s\nBETTER_AUTH_URL=%s\nR2_ACCOUNT_ID=%s\nR2_ACCESS_KEY_ID=%s\nR2_SECRET_ACCESS_KEY=%s\nR2_BUCKET=%s\nR2_PUBLIC_URL=%s\n' \
              "${{ secrets.DATABASE_URL }}" \
              "${{ secrets.BETTER_AUTH_SECRET }}" \
              "https://aws.steveackley.org" \
              "${{ secrets.R2_ACCOUNT_ID }}" \
              "${{ secrets.R2_ACCESS_KEY_ID }}" \
              "${{ secrets.R2_SECRET_ACCESS_KEY }}" \
              "${{ secrets.R2_BUCKET }}" \
              "${{ secrets.R2_PUBLIC_URL }}" > web.env
            chmod 600 web.env

            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose pull web
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose up -d --remove-orphans
            docker image prune -f
