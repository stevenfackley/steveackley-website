name: CI / Deploy to GHCR & EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

# Serialize deploys to main so concurrent pushes can't race the EC2 box
# (interleaving the .env write / docker compose up). PR runs cancel superseded
# in-progress runs; main runs queue so a deploy is never cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    uses: stevenfackley/gh-actions/.github/workflows/ci-astro.yml@v1
    with:
      project-name: steveackley-web
      workspace: apps/site
      build-cmd: npm run build:site
    secrets: inherit

  build-and-push:
    name: "🐳 Build & Push to GHCR"
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ghcr.io/stevenfackley/steveackley-web@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/stevenfackley/steveackley-web:buildcache
          cache-to: type=registry,ref=ghcr.io/stevenfackley/steveackley-web:buildcache,mode=max
          tags: |
            ghcr.io/stevenfackley/steveackley-web:latest
            ghcr.io/stevenfackley/steveackley-web:sha-${{ github.sha }}

  deploy:
    name: "🚀 Deploy to EC2"
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}

            # Stash any local changes to avoid merge conflicts
            git stash --include-untracked || true
            git pull origin main
            chmod +x docker/entrypoint.sh
            chmod +x docker/seed-admin.cjs

            # Construct .env from secrets (chmod 600 before writing to protect contents)
            AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
            if [ -z "$AUTH_SECRET" ]; then
              echo "ERROR: AUTH_SECRET is not set in GitHub Secrets — deployment aborted to prevent auth failure"
              exit 1
            fi

            # URL-encode the plus sign in DATABASE_URL if present (it breaks Node URL parser)
            ENCODED_DB_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's/\+/%2B/g')

            : > .env && chmod 600 .env
            printf 'DATABASE_URL=%s\nAUTH_SECRET=%s\nBETTER_AUTH_SECRET=%s\n' \
              "$ENCODED_DB_URL" \
              "$AUTH_SECRET" \
              "$AUTH_SECRET" >> .env

            printf 'BETTER_AUTH_URL=%s\nADMIN_EMAIL=%s\nADMIN_PASSWORD=%s\nADMIN_PASSWORD_HASH=%s\nGH_API_TOKEN=%s\n' \
              "https://steveackley.org" \
              "stevenfackley@gmail.com" \
              "${{ secrets.ADMIN_PASSWORD }}" \
              "${{ secrets.ADMIN_PASSWORD_HASH }}" \
              "${{ secrets.GH_API_TOKEN }}" >> .env
            printf 'R2_ACCOUNT_ID=%s\nR2_ACCESS_KEY_ID=%s\nR2_SECRET_ACCESS_KEY=%s\nR2_BUCKET=%s\nR2_PUBLIC_URL=%s\n' \
              "${{ secrets.R2_ACCOUNT_ID }}" \
              "${{ secrets.R2_ACCESS_KEY_ID }}" \
              "${{ secrets.R2_SECRET_ACCESS_KEY }}" \
              "${{ secrets.R2_BUCKET }}" \
              "${{ secrets.R2_PUBLIC_URL }}" >> .env
            printf 'CLOUDFLARE_TUNNEL_TOKEN=%s\n' "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" >> .env


            # Reclaim disk BEFORE pulling. Accumulated image tags + layers from
            # many deploys filled the box ("no space left on device" on pull).
            # -af removes all images not used by a running container, plus build
            # cache. NO --volumes, so the Postgres data volume is never touched.
            docker system prune -af || true

            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose pull web
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" docker compose up -d --remove-orphans
            # Cleanup is best-effort; concurrent prunes (from prior overlapping deploy)
            # return "a prune operation is already running" with exit 1 — don't fail the deploy.
            docker image prune -f || true

            # Wait for the web container to pass its health checks (up to 60s)
            echo "Waiting for steveackley-web to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Status}}' steveackley-web 2>/dev/null || echo "missing")
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/ 2>/dev/null || echo "000")
              echo "  attempt $i/30: container=$STATUS http=$HTTP"
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
                echo "✓ Deployment healthy"
                exit 0
              fi
              sleep 2
            done
            echo "✗ Deployment did not become healthy in time"
            docker logs steveackley-web --tail 50
            exit 1
