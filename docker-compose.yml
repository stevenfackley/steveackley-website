# =============================================================================
# steveackley.org — Production Docker Compose (Astro 5)
# =============================================================================

services:
  web:
    image: ${IMAGE_REF:-ghcr.io/stevenfackley/steveackley-web:latest}
    build: .
    container_name: steveackley-web
    ports:
      - "3000:3000"
    env_file:
      - web.env
    environment:
      NODE_ENV: production
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      ADMIN_EMAIL: "stevenfackley@gmail.com"
      NEXT_PUBLIC_LINKEDIN_URL: "https://linkedin.com/in/stevenfackley"
      NEXT_PUBLIC_EMAIL: "stevenfackley@gmail.com"
      NEXT_PUBLIC_P1_OPS_HUB_URL: "https://test.steveackley.org"
      MAX_UPLOAD_SIZE_MB: "5"
      # GitHub API token for fetching public repos on the home page
      GH_API_TOKEN: "${GH_API_TOKEN}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web
      - internal

  db:
    image: postgres:16-alpine
    container_name: steveackley-db
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: steveackleydb
      POSTGRES_USER: steveackley
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steveackley -d steveackleydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  postgres_data:
    driver: local

networks:
  web:
    external: true
    name: web
  internal:
    driver: bridge
