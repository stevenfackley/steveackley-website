apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: canarydeployments.hybridplatform.io
spec:
  group: hybridplatform.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                tenantId:
                  type: string
                version:
                  type: string
                payloadUrl:
                  type: string
                rollbackVersion:
                  type: string
                stages:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      percentage:
                        type: integer
                      durationMinutes:
                        type: integer
                      errorThreshold:
                        type: number
            status:
              type: object
              properties:
                phase:
                  type: string
                currentStage:
                  type: integer
                errorRate:
                  type: number
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantId
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
  scope: Namespaced
  names:
    plural: canarydeployments
    singular: canarydeployment
    kind: CanaryDeployment
    shortNames:
      - canary